name: Holiday-Vibes Infrastructure deploy workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Infrastructure to prod
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Add SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key
          chmod 600 private_key

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} <<'EOF'
            if [ ! -d "/projects/holiday-vibes/Infrastructure" ]; then
              git clone git@github-infrastructure:HolidayVibes/Infrastructure.git /projects/holiday-vibes/Infrastructure
            else
              cd /projects/holiday-vibes/Infrastructure
              git reset --hard
              git pull origin main
            fi

            cd /projects/holiday-vibes/Infrastructure
            docker compose up -d --force-recreate
          EOF